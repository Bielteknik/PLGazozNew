<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palandöken Gazoz - HMI</title>
</head>
<body style="background-color: #0B0D11; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif;">
  
  <div id="root" style="text-align: center;">
    <h1 id="loading-text" style="font-size: 24px;">Sistem Yükleniyor...</h1>
    <p id="debug-text" style="color: #666; font-size: 14px;">(JavaScript bekleniyor)</p>
  </div>

  <!-- JS'nin çalışıp çalışmadığını anlamak için basit bir test -->
  <script>
    console.log("HTML İçi Script: Başlatıldı.");
    document.getElementById('debug-text').innerText = "JS Dosyası Çağrıldı, Yanıt Bekleniyor...";
    
    // Global hata yakalayıcı (Inline)
    window.onerror = function(msg, url, line) {
      document.body.innerHTML += '<div style="position:fixed; top:0; background:red; color:white; width:100%; p:10px;">HATA: ' + msg + '</div>';
    };
  </script>

  <script type="module" src="/src/main.tsx"></script>

</body>
</html>
